# .github/workflows/generate-trips.yml
#
# Connects to Supabase via direct Postgres credentials, reconstructs all trips,
# writes trips.geojson, and commits it so GitHub Pages can serve it statically.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_HOST, SUPABASE_PORT, SUPABASE_DB, SUPABASE_USER, SUPABASE_PASSWORD
#
# Trigger: every 6 hours + manual dispatch

name: Generate trips GeoJSON

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — adjust as needed
  workflow_dispatch:          # allows manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv numpy

      - name: Generate trips.geojson
        env:
          SUPABASE_HOST:     ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:     ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB:       ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER:     ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python generate_trips_geojson.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trips.geojson
          # Only commit if trips.geojson actually changed
          git diff --cached --quiet || git commit -m "chore: regenerate trips.geojson [skip ci]"
          git push
